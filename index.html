<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyZone — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">Study<span>Zone</span></div>
      <p class="auth-sub">your school's all-in-one hub</p>

      <div id="auth-error" class="error-msg" style="display:none"></div>

      <button class="btn-google" id="google-login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign up</button>
      </div>

      <div id="tab-login">
        <input type="email" id="login-email" class="auth-input" placeholder="Email" />
        <input type="password" id="login-password" class="auth-input" placeholder="Password" />
        <button class="btn-primary" onclick="emailLogin()">Log in</button>
      </div>

      <div id="tab-signup" style="display:none">
        <input type="text" id="signup-name" class="auth-input" placeholder="Your name" />
        <input type="email" id="signup-email" class="auth-input" placeholder="Email" />
        <input type="password" id="signup-password" class="auth-input" placeholder="Password (min 6 chars)" />
        <button class="btn-primary" onclick="emailSignup()">Create account</button>
      </div>

      <p class="auth-footer">by signing in you agree to use this responsibly 🙂</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
